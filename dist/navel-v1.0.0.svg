<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    
  </defs>

  <!-- Background -->
  <rect width="640" height="320" fill="#ffffff"/>
  

  <!-- Repo name (caption style) -->
  <text x="40" y="65.0" font-family="TX-02-Variable-LL" font-weight="310" font-stretch="87.5%" font-size="11" letter-spacing="2" fill="#969ba5">NAVEL</text>

  <!-- Version Tag (display style: light weight, 42px) -->
  <text
    x="40"
    y="110.0"
    font-family="TX-02-Variable-LL"
    font-weight="175"
    font-size="42"
    letter-spacing="0.025em"
    fill="#1e2229"
  >v1.0.0</text>

  <!-- Codename (text style: regular, oblique, 16px) -->
  <!-- Using skewX transform for oblique since resvg doesn't synthesize it for variable fonts -->
  <!-- Wrapped in group to apply skew around text position without shifting -->
  <g transform="translate(40, 145.0)">
    <text
      x="0"
      y="0"
      font-family="TX-02-Variable-LL"
      font-weight="310"
      font-size="16"
      transform="skewX(-12)"
      fill="#6b727d"
    >"Omphaloskepsis"</text>
  </g>

  <!-- TL;DR bullets -->
  <text x="40" y="185.0" font-family="TX-02-Variable-LL" font-weight="310" font-size="12" fill="#3d434d"><tspan fill="#969ba5">→</tspan> 347 versions of Claude Code, regex&apos;d</text>
  <text x="40" y="205.0" font-family="TX-02-Variable-LL" font-weight="310" font-size="12" fill="#3d434d"><tspan fill="#969ba5">→</tspan> Feature flags named tengu_marble_whisper</text>
  <text x="40" y="225.0" font-family="TX-02-Variable-LL" font-weight="310" font-size="12" fill="#3d434d"><tspan fill="#969ba5">→</tspan> An AI built a tool to examine its own guts</text>

  <!-- Watermark barcode -->
  <g transform="translate(480.0, 40.0) scale(0.6)" opacity="0.5">
    <path d="M10,50L12,50L12,70L10,70L10,50ZM16,50L18,50L18,70L16,70L16,50ZM20,50L24,50L24,70L20,70L20,50ZM26,50L30,50L30,70L26,70L26,50ZM32,50L34,50L34,70L32,70L32,50ZM36,50L40,50L40,70L36,70L36,50ZM42,50L46,50L46,70L42,70L42,50ZM48,50L50,50L50,70L48,70L48,50ZM54,50L56,50L56,70L54,70L54,50ZM58,50L60,50L60,70L58,70L58,50ZM62,50L64,50L64,70L62,70L62,50ZM66,50L70,50L70,70L66,70L66,50ZM72,50L74,50L74,70L72,70L72,50ZM76,50L78,50L78,70L76,70L76,50ZM82,50L86,50L86,70L82,70L82,50ZM88,50L92,50L92,70L88,70L88,50ZM94,50L96,50L96,70L94,70L94,50ZM98,50L100,50L100,70L98,70L98,50ZM104,50L106,50L106,70L104,70L104,50ZM108,50L112,50L112,70L108,70L108,50ZM114,50L118,50L118,70L114,70L114,50ZM122,50L124,50L124,70L122,70L122,50ZM126,50L130,50L130,70L126,70L126,50ZM132,50L134,50L134,70L132,70L132,50ZM136,50L138,50L138,70L136,70L136,50ZM140,50L142,50L142,70L140,70L140,50ZM144,50L148,50L148,70L144,70L144,50ZM150,50L152,50L152,70L150,70L150,50ZM154,50L156,50L156,70L154,70L154,50ZM160,50L164,50L164,70L160,70L160,50ZM166,50L170,50L170,70L166,70L166,50ZM172,50L174,50L174,70L172,70L172,50ZM176,50L180,50L180,70L176,70L176,50ZM182,50L184,50L184,70L182,70L182,50ZM188,50L190,50L190,70L188,70L188,50ZM192,50L194,50L194,70L192,70L192,50ZM198,50L200,50L200,70L198,70L198,50ZM202,50L206,50L206,70L202,70L202,50ZM208,50L212,50L212,70L208,70L208,50ZM214,50L216,50L216,70L214,70L214,50Z" fill="#c5c9d0" transform="translate(-10, -50)"/>
  </g>

  <!-- Stamp -->
  <g transform="translate(430.0, 110.0) scale(0.85)">
    <svg width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <!-- 
      Ring: inner r=62, outer r=86, center r=74
      Both texts read left→right
      Both centered in ring using dominant-baseline: central
    -->
    
    <!-- Top arc: left→right through TOP at r=74 -->
    <path id="topArc" d="M 26,100 A 74,74 0 0,1 174,100" fill="none"/>
    
    <!-- Bottom arc: left→right through BOTTOM at r=74 -->
    <path id="bottomArc" d="M 26,100 A 74,74 0 0,0 174,100" fill="none"/>
    
    <!-- Clip path for center stripe -->
    <clipPath id="innerClip">
      <circle cx="100" cy="100" r="58"/>
    </clipPath>
  </defs>
  
  <!-- Rotate entire stamp -12° -->
  <g transform="rotate(-12, 100, 100)">
    <!-- Outer circle with texture -->
    <circle cx="100" cy="100" r="92" fill="none" stroke="#6b727d" stroke-width="6" stroke-dasharray="6 3"/>
    
    <!-- Main circle -->
    <circle cx="100" cy="100" r="86" fill="none" stroke="#6b727d" stroke-width="3"/>
    
    <!-- Inner circle -->
    <circle cx="100" cy="100" r="62" fill="none" stroke="#6b727d" stroke-width="1"/>
    
    <!-- Center stripe for version number -->
    <g clip-path="url(#innerClip)">
      <rect x="0" y="88" width="200" height="24" fill="#6b727d"/>
    </g>
    
    <!-- Top text: BEEP-BOP-BOOP -->
    <text 
      font-family="TX-02-Variable-LL" 
      font-size="15" 
      fill="#6b727d" 
      letter-spacing="2"
      dominant-baseline="central"
    >
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">
        BEEP-BOP-BOOP
      </textPath>
    </text>
    
    <!-- Bottom text: CERTIFIED -->
    <text 
      font-family="TX-02-Variable-LL" 
      font-size="15" 
      fill="#6b727d" 
      letter-spacing="3"
      dominant-baseline="central"
    >
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
        CERTIFIED
      </textPath>
    </text>
    
    <!-- Center text (version) -->
    <text 
      x="100" 
      y="104" 
      font-family="TX-02-Variable-LL" 
      font-size="14" 
      fill="#ffffff" 
      text-anchor="middle"
    >
      v1.0.0
    </text>
  </g>
</svg>
  </g>
</svg>