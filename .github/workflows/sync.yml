name: Sync Claude Code Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: navel-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq ripgrep

      - name: Restore docs cache
        uses: actions/cache@v5
        with:
          path: docs
          key: navel-docs-${{ hashFiles('reports/docs-changes.json') }}
          restore-keys: navel-docs-

      - name: Sync npm versions
        run: bin/navel npm sync

      - name: Sync hooks
        run: bin/navel hooks sync

      - name: Sync commands
        run: bin/navel commands sync

      - name: Sync docs
        run: bin/navel docs sync

      - name: Commit and push if changed
        run: |
          # Only proceed if data files changed — ignore README badge-only updates
          data_files="npm/versions.json reports/commands.json reports/hooks.json reports/docs-changes.json reports/nav.json"
          if git diff --quiet -- $data_files; then
            echo "No data changes detected"
            exit 0
          fi

          # Regenerate READMEs only when data actually changed
          bin/navel readme sync

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create per-scope commits
          libexec/build-sync-commit-msg

          git push origin main
