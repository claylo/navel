name: Sync Claude Code Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: navel-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v5

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq ripgrep

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Restore npm scan cache
        uses: actions/cache@v5
        with:
          path: npm/.cache
          key: navel-npm-cache-${{ hashFiles('npm/versions.json') }}
          restore-keys: navel-npm-cache-

      - name: Restore docs cache
        uses: actions/cache@v5
        with:
          path: docs
          key: navel-docs-${{ github.run_id }}
          restore-keys: navel-docs-

      - name: Restore prompt captures cache
        uses: actions/cache@v5
        with:
          path: prompts/versions
          key: navel-captures-${{ hashFiles('npm/versions.json') }}
          restore-keys: navel-captures-

      - name: Sync npm versions
        run: bin/navel npm sync

      - name: Sync hooks
        run: bin/navel hooks sync

      - name: Sync commands
        run: bin/navel commands sync

      - name: Sync env vars
        run: bin/navel env-vars sync

      - name: Sync docs
        run: bin/navel docs sync
        env:
          IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
          IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}

      - name: Capture latest prompt
        continue-on-error: true
        run: |
          latest=$(jq -r '.[]' npm/versions.json | sort -V | tail -1)
          if [[ -f "prompts/versions/v${latest}/capture.md" ]]; then
            echo "Prompt already captured for v${latest}"
          else
            echo "Capturing prompt for v${latest}..."
            bin/navel prompts capture "$latest"
          fi

      - name: Sync prompt diffs
        continue-on-error: true
        run: bin/navel prompts sync-diffs

      - name: Commit and push if changed
        id: commit
        run: |
          # Only proceed if data files changed — ignore README badge-only updates
          data_files="npm/versions.json reports/commands.json reports/hooks.json reports/env-vars.json reports/docs-changes.json reports/nav.json reports/prompt-diffs.json prompts/diffs/"
          if git diff --quiet -- $data_files; then
            echo "No data changes detected"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Regenerate READMEs only when data actually changed
          bin/navel readme sync

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create per-scope commits
          libexec/build-sync-commit-msg

          git push origin main
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Verify docset and PDF builds
        if: steps.commit.outputs.pushed == 'true'
        run: bin/navel monitor dash pdf
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
