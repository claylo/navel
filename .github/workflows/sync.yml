name: Sync Claude Code Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: navel-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq ripgrep

      - name: Restore npm cache
        uses: actions/cache@v5
        with:
          path: |
            npm/versions
            npm/.cache
          key: navel-npm-${{ hashFiles('npm/versions.json') }}
          restore-keys: navel-npm-

      - name: Restore docs cache
        uses: actions/cache@v5
        with:
          path: docs
          key: navel-docs-${{ hashFiles('reports/docs-changes.json') }}
          restore-keys: navel-docs-

      - name: Sync npm versions
        run: bin/navel npm sync

      - name: Sync hooks
        run: bin/navel hooks sync

      - name: Sync commands
        run: bin/navel commands sync

      - name: Sync docs
        run: bin/navel docs sync

      - name: Update README
        run: bin/navel readme sync

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No changes detected"
            exit 0
          fi

          latest=$(jq -r '.[]' npm/versions.json | sort -V | tail -1)
          branch="auto/sync-$(date -u +%Y-%m-%d-%H%M)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -u
          git commit -m "chore: sync claude code data (v${latest})"
          git push -u origin "$branch"

          gh pr create \
            --title "chore: sync claude code data (v${latest})" \
            --body "Automated sync of Claude Code tracking data for v${latest}." \
            --base main

          gh pr merge --auto --squash "$branch"
